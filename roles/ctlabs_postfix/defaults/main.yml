---

# ------------------------------------------------------------------------------
# File        : ctlabs-ansible/roles/ctlabs_postfix/defaults/main.yml
# Description : defaults
# ------------------------------------------------------------------------------

ctlabs_postfix:
  defaults:
    pkgs:
      - name : postfix
      - name : "{{ 's-nail'       if ansible_distribution_major_version == '9' else 'mailx' }}" 
      - name : "{{ 'postfix-pcre' if ansible_distribution_major_version != '7' }}"
      - name : ruby
      - name : mutt
    config:
      dir     : /etc/postfix
      postmap : /usr/sbin/postmap
      groups  : [syslog]
      files :
        - name     : main.cf
          template : main.cf.j2
        - name     : master.cf
          template : master.cf.j2
      maps:
        - name     : virtual
          template : virtual.j2
        - name     : transport
          template : transport.j2
        - name     : recipient_bcc
          template : recipient_bcc.j2
        - name     : recipient_canonical
          template : recipient_canonical.j2
      archive:
        dir  : /var/email_archive
        user : mail
        group: syslog
      mailbox:
        user    : ctlabs
        group   : ctlabs
        template: muttrc.j2
        file    : /home/ctlabs/.muttrc
    dkim:
      enable  : false
      pkgs:
        - name : "{{ 'python3-dkimpy-milter' if ansible_distribution_major_version | int >= 8 else 'dkimpy-milter' }}"
      config:
        dir : /etc/dkimpy-milter
        file: dkimpy-milter.conf
      socket    : inet:localhost:8891
      selector  : default
      milter:
        smtpd_milters       : inet:localhost:8891
        non_smtpd_milters   : inet:localhost:8891
        milter_protocol     : 2
        milter_default_action: accept
      keys:
        dir   : /etc/dkimpy-milter/keys
        bits  : 2048
      service:
        name: dkimpy-milter
    service:
      name      : postfix.service
      templates : postfix.service.j2
  os:
    - redhat7
    - redhat8
    - redhat9
    - centos7
    - centos8
    - centos9
