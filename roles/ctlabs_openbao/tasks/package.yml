---

# ------------------------------------------------------------------------------
# File        : ctlabs-ansible/roles/ctlabs_openbao/tasks/package.yml
# Description : description
# ------------------------------------------------------------------------------

# yum-config-manager --add-repo https://rpm.releases.hashicorp.com/RHEL/hashicorp.repo
# root@vdb1:/# cat /etc/apt/sources.list.d/hashicorp.list
# deb [arch=amd64 signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com bullseye main

#
# RedHat
#
- name: ctlabs_openbao.tasks.package.redhat
  when: ctg_os_family == "redhat"
  block:
    - name: ctlabs_openbao.tasks.package.redhat.repo.file
      yum_repository:
        name        : "{{ item.name }}"
        description : "{{ item.name }}"
        baseurl     : "{{ item.url  }}"
        gpgkey      : "{{ item.key  }}"
        gpgcheck    : true
        sslverify   : true
      loop: "{{ ctlabs_openbao.defaults.repos[ctg_os_family] }}"

#
# Debian
#
- name: ctlabs_openbao.tasks.package.debian
  when: ctg_os_family == "debian"
  block:
    - name: ctlabs_openbao.tasks.package.debian.keydir
      file:
        path : "{{ ctlabs_openbao.defaults.config.keydir }}"
        state: directory
        mode : '0755'
    
    - name: ctlabs_openbao.tasks.package.debian.repos.key
      get_url:
        url : "{{ item.key }}"
        dest: "{{ ctlabs_openbao.defaults.config.keydir }}/{{ item.name }}.asc"
        mode: '0644'
      loop: "{{ ctlabs_openbao.defaults.repos[ctg_os_family] }}"
    
    - name: ctlabs_openbao.tasks.package.debian.repos.file
      copy:
        dest: /etc/apt/sources.list.d/openbao.sources
        mode: '0644'
        content: |
          Types: deb
          URIs: {{ item.url }}
          Suites: {{ item.suite }}
          Components: {{ item.type }}
          Signed-By: "{{ ctlabs_openbao.defaults.config.keydir }}/{{ item.name }}.asc"
      loop: "{{ ctlabs_openbao.defaults.repos[ctg_os_family] }}"

    - name: ctlabs_openbao.tasks.package.debian.update.cache
      apt:
        update_cache: true

- name: ctlabs_openbao.tasks.package.install
  package:
    name  : "{{ item.name }}"
    state : present
  loop    : "{{ ctlabs_openbao.defaults.pkgs[ctg_os_family] }}"
  when    : item.when is not defined or item.when
  register: result
  until   : result is success

- name: ctlabs_openbao.tasks.package.redhat.pips.install
  when: ctg_os_family == "redhat" or ctg_os == "debian11"
  pip:
    name: "{{ item }}"
  loop: "{{ ctlabs_openbao.defaults.pkgs.pips }}"

- name: ctlabs_openbao.tasks.package.group.certs.member
  user:
    name  : "{{ ctlabs_openbao.defaults.service.user   }}"
    group : "{{ ctlabs_openbao.defaults.service.group  }}"
    groups: "{{ ctlabs_openbao.defaults.service.groups }}"


#
# Backup Script
#
- name: ctlabs_openbao.tasks.package.backup.script
  copy:
    src   : "{{ ctlabs_openbao.defaults.files.backup.script }}"
    dest  : "{{ ctlabs_openbao.defaults.files.backup.dst    }}"
    owner : root
    group : root
    mode  : '0750'
