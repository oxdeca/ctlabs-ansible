---

# ------------------------------------------------------------------------------
# File        : ctlabs-ansible/roles/ctlabs_openbao/tasks/config.yml
# Description : configurations
# ------------------------------------------------------------------------------

- name: ctlabs_openbao.tasks.config.dir
  file:
    path : "{{ ctlabs_openbao.defaults.config.dir }}"
    state: directory
    owner: "{{ ctlabs_openbao.defaults.service.user  }}"
    group: "{{ ctlabs_openbao.defaults.service.group }}"

#
# Server
#
- name: ctlabs_openbao.tasks.config.server
  when: CTLABS_OPENBAO_SERVER == 'true'
  block:
    - name: ctlabs_openbao.tasks.config.server.openbao.data.dir
      file:
        path : "{{ ctlabs_openbao.defaults.config.server.data }}"
        owner: "{{ ctlabs_openbao.defaults.service.user  }}"
        group: "{{ ctlabs_openbao.defaults.service.group }}"
        state: directory

    - name: ctlabs_openbao.tasks.config.server.openbao
      template:
        src  : "{{ ctlabs_openbao.defaults.config.server.template }}"
        dest : "{{ ctlabs_openbao.defaults.config.dir }}/{{ ctlabs_openbao.defaults.config.server.file }}"
      notify: ctlabs_openbao.handlers.service.openbao.reload
