- name: ctlabs_openbao.handlers.service.openbao.restart
  service:
    name    : "{{ ctlabs_openbao.defaults.service.name }}"
    enabled : true
    state   : restarted

- name: ctlabs_openbao.handlers.service.openbao.reload
  systemd:
    daemon_reload: true

