---

# ------------------------------------------------------------------------------
# File        : ctlabs-ansible/roles/ctlabs_picode/tasks/config.yml
# Description : configurations
# ------------------------------------------------------------------------------

- name: ctlabs_picode.tasks.config.group
  group:
    name   : "{{ ctlabs_picode.defaults.config.group }}"
    system : true

- name: ctlabs_picode.tasks.config.user
  user:
    name   : "{{ ctlabs_picode.defaults.config.user  }}"
    group  : "{{ ctlabs_picode.defaults.config.group }}"
    system : true

- name: ctlabs_picode.tasks.config.group.certs.member
  user:
    name  : "{{ ctlabs_picode.defaults.config.user   }}"
    group : "{{ ctlabs_picode.defaults.config.group  }}"
    groups: "{{ ctlabs_picode.defaults.config.groups }}"
    shell : /bin/bash

- name: ctlabs_picode.tasks.config.opencode.dir
  file:
    path : "{{ ctlabs_picode.defaults.config.dir }}"
    state: directory
    owner: "{{ ctlabs_picode.defaults.config.user  }}"
    group: "{{ ctlabs_picode.defaults.config.group }}"
    mode : '0750'

- name: ctlabs_picode.tasks.config.profile.d
  template:
    src  : "{{ ctlabs_picode.defaults.config.profile.template }}"
    dest : "{{ ctlabs_picode.defaults.config.profile.file     }}"

