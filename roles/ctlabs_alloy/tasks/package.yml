---

# ------------------------------------------------------------------------------
# File        : ctlabs-ansible/roles/ctlabs_alloy/tasks/package.yml
# Description : main ctlabs_alloy tasks file.
# ------------------------------------------------------------------------------

#
# RedHat
#
- name: ctlabs_alloy.tasks.package.redhat
  when: ctg_os_family == 'redhat'
  block:
    - name: ctlabs_alloy.tasks.package.redhat.repo.file
      yum_repository:
        name        : "{{ item.name }}"
        description : "{{ item.desc }}"
        baseurl     : "{{ item.url  }}"
        gpgkey      : "{{ item.key  }}"
        gpgcheck    : true
        sslverify   : true
        sslcacert   : "{{ item.cacert }}"
      loop : "{{ ctlabs_alloy.defaults.repos.redhat }}"

#
# Debian
#
- name: ctlabs_alloy.tasks.package.debian
  when: ctg_os_family == 'debian'
  block:
    - name: ctlabs_alloy.tasks.package.debian.keyring.dir
      file:
        path: "{{ ctlabs_alloy.defaults.config.apt_keys }}"
        state: directory

    - name: ctlabs_alloy.tasks.package.debian.repos.key
      get_url:
        url  : "{{ item.key }}"
        dest : "{{ ctlabs_alloy.defaults.config.keydir  }}/{{ item.name }}.asc"
      loop: "{{ ctlabs_alloy.defaults.repos.debian }}"

    - name: ctlabs_alloy.tasks.package.debian.repos.file
      copy:
        dest: /etc/apt/sources.list.d/alloy.sources
        mode: '0644'
        content: |
          Types: deb
          URIs: {{ item.url }}
          Suites: {{ item.suite }}
          Components: {{ item.type }}
          Signed-By: {{ ctlabs_alloy.defaults.config.keydir }}/{{ item.name }}.asc
      loop: "{{ ctlabs_alloy.defaults.repos[ctg_os_family] }}"      

#    - name: ctlabs_alloy.tasks.package.debian.repo.file
#      apt_repository:
#        repo: "deb [signed-by={{ ctlabs_alloy.defaults.config.apt_keys }}/{{ item.name }}.asc] {{ item.url }} stable {{ item.type }}"
#      loop: "{{ ctlabs_alloy.defaults.repos.debian }}"


- name: ctlabs_alloy.tasks.package.install
  package:
    name  : "{{ item.name }}"
    state : present
  loop    : "{{ ctlabs_alloy.defaults.pkgs[ctg_os_family] }}"
  register: result
  until   : result is success

- name: ctlabs_alloy.tasks.package.group.certs.member
  user:
    name  : "{{ ctlabs_alloy.defaults.service.user   }}"
    group : "{{ ctlabs_alloy.defaults.service.group  }}"
    groups: "{{ ctlabs_alloy.defaults.service.groups }}"
