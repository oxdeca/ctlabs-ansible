---

# ------------------------------------------------------------------------------
# File        : ctlabs-ansible/roles/ctlabs_kafka/tasks/precheck.yml
# Description : ctlabs_kafka prechecks
# ------------------------------------------------------------------------------

- debug: var=os
- debug: var=ctlabs_kafka.os

- name: ctlabs_kafka.tasks.precheck
  block:
    - name: ctlabs_kafka.tasks.precheck.os.supported
      assert:
        that     : ctg_os is in ctlabs_kafka.os
        fail_msg : "OS[{{ ctg_os }}] is not supported!"
  rescue:
    - name: ctlabs_kafka.tasks.precheck.skip.unsupported
      meta: end_host

- name: ctlabs_kafka.tasks.precheck.kafka.server_address.var
  set_fact:
    ctlabs_kafka_server_address: "{{ CTLABS_KAFKA_SERVER_ADDRESS | default(ctlabs_kafka.defaults.config.server.address) }}"

- name: ctlabs_kafka.tasks.precheck.kafka.server_address.local_fact
  set_fact:
    ctlabs_kafka_server_address: "{{ ansible_local.ctlabs_kafka.kafka.server_address | default(ctlabs_kafka_server_address) }}"
