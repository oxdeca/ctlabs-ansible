---

# ------------------------------------------------------------------------------
# File        : ctlabs-ansible/roles/ctlabs_wazuh/tasks/precheck.yml
# Description : tasks prechecks
# ------------------------------------------------------------------------------

- name: ctlabs_wazuh.tasks.precheck
  block:
    - name: ctlabs_wazuh.tasks.precheck.os.supported
      assert:
        that: ctg_os is in ctlabs_wazuh.os
        fail_msg: "OS [{{ ctg_os }}] is not supported!"
  rescue:
    - name: ctlabs_wazuh.tasks.precheck.skip.unsupported
      meta: end_host

- name: ctlabs_wazuh.tasks.precheck.role.var
  set_fact:
    ctlabs_wazuh_role: "{{ ctlabs_wazuh_role | default(ctlabs_wazuh.defaults.config.role) }}"

- name: ctlabs_wazuh.tasks.precheck.role.local_fact
  set_fact:
    ctlabs_wazuh_role: "{{ ctg_facts.ctlabs_wazuh.role | default(ctlabs_wazuh_role) }}"

- name: ctlabs_wazuh.tasks.precheck.agent.server_addr
  when: ctlabs_wazuh_role == "agent"
  set_fact:
    ctlabs_wazuh_agent_server_addr: "{{ ctg_facts.ctlabs_wazuh.server_addr | default(ctlabs_wazuh.defaults.config.agent.server_addr) }}"

- name: ctlabs_wazuh.tasks.precheck.server.indexer_network_host
  when: ctlabs_wazuh_role == "server"
  set_fact:
    ctlabs_wazuh_indexer_network_host: "{{ ctg_facts.ctlabs_wazuh.indexer.network.host | default(ctlabs_wazuh.defaults.config.indexer.network.host) }}"

- name: ctlabs_wazuh.tasks.precheck.server.manager_addr
  when: ctlabs_wazuh_role == "server"
  set_fact:
    ctlabs_wazuh_manager_addr: "{{ ctg_facts.ctlabs_wazuh.manager.addr | default(ctlabs_wazuh.defaults.config.manager.addr) }}"

- name: ctlabs_wazuh.tasks.precheck.server.dashboard_host
  when: ctlabs_wazuh_role == "server"
  set_fact:
    ctlabs_wazuh_dashboard_host: "{{ ctg_facts.ctlabs_wazuh.dashboard.host | default(ctlabs_wazuh.defaults.config.dashboard.host) }}"
