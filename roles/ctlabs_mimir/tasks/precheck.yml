---

# ------------------------------------------------------------------------------
# File        : ctlabs-ansible/roles/ctlabs_mimir/tasks/precheck.yml
# Description : prechecks
# ------------------------------------------------------------------------------

- name: ctlabs_mimir.tasks.precheck
  block:
    - name: ctlabs_mimir.tasks.precheck.os.supported
      assert:
        that: ctg_os is in ctlabs_mimir.os
        fail_msg: "OS [{{ ctg_os }}] is not supported!"
  rescue:
    - name: ctlabs_mimir.tasks.precheck.skip.unssupported
      meta: end_host

- name: ctlabs_mimir.tasks.precheck.mtls.client
  set_fact:
    ctlabs_mimir_mtls_client: "{{ ctg_facts.ctlabs_mimir.mtls.client | default(false) }}"
