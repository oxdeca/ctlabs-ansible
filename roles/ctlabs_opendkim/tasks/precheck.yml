---

# ------------------------------------------------------------------------------
# File        : ctlabs-ansible/roles/ctlabs_opendkim/tasks/precheck.yml
# Description : precheck
# ------------------------------------------------------------------------------

- name: ctlabs_opendkim.tasks.precheck
  block:
    - name: ctlabs_opendkim.tasks.precheck.supported_os
      ansible.builtin.assert:
        that: ctg_os in ctlabs_opendkim.os
        fail_msg: "OS [{{ ctg_os }}] is not supported!"
  rescue:
    - name: ctlabs_opendkim.tasks.precheck.skip.unsupported
      meta: end_host

- name: ctlabs_opendkim.tasks.precheck.resolve.domain
  ansible.builtin.set_fact:
    ctlabs_opendkim_domain: "{{ ctg_facts.ctlabs_opendkim.domain | default(ansible_domain) | default(ansible_hostname) }}"

- name: ctlabs_opendkim.tasks.precheck.resolve.selector
  ansible.builtin.set_fact:
    ctlabs_opendkim_selector: "{{ ctg_facts.ctlabs_opendkim.selector | default(ansible_nodename | hash('md5')) }}"

- name: ctlabs_opendkim.tasks.precheck.resolve.algorithm
  ansible.builtin.set_fact:
    ctlabs_opendkim_key_algorithm: "{{ ctg_facts.ctlabs_opendkim.algorithm | default(ctlabs_opendkim.defaults.key.type) }}"

- name: ctlabs_opendkim.tasks.precheck.resolve.key_type
  ansible.builtin.set_fact:
    ctlabs_opendkim_key_type: >-
      {{
        'Ed25519' if ctlabs_opendkim_key_algorithm == 'ed25519'
        else 'RSA' if ctlabs_opendkim_key_algorithm == 'rsa'
        else ctlabs_opendkim_key_algorithm | capitalize
      }}

- name: ctlabs_opendkim.tasks.precheck.resolve.length
  ansible.builtin.set_fact:
    ctlabs_opendkim_key_length: "{{ ctg_facts.ctlabs_opendkim.length | default(ctlabs_opendkim.defaults.key.length) }}"
