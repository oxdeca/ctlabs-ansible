---

# ------------------------------------------------------------------------------
# File        : ctlabs-ansible/roles/ctlabs_kind/defaults/main.yml
# Description : main defaults
# ------------------------------------------------------------------------------

versions:
  kind   : 0.31.0
  kubectl: 1.31.1
  helm   : 3.16.1

ctlabs_kind:
  defaults:
    pkgs:
      debian:
        - name: podman
      redhat:
        - name: podman
      kind:
        url    : "https://kind.sigs.k8s.io/dl/v{{ versions.kind }}/kind-linux-amd64"
        path   : /usr/bin/kind
        mode   : '0750'
      kubectl:
        version:
        url    : "https://dl.k8s.io/release/v{{ versions.kubectl }}/bin/linux/amd64/kubectl"
        path   : /usr/bin/kubectl
        mode   : '0750'
      helm:
        version: 
        url    : "https://get.helm.sh/helm-v{{ versions.helm }}-linux-amd64.tar.gz"
        tmptar : /tmp/helm.tar.gz
        tmpdir : /tmp
        tardir : /tmp/linux-amd64
        path   : /usr/bin/helm
        mode   : '0750'
  os:
    - centos9
    - redhat9
    - debian12
  virtype:
    - kvm
