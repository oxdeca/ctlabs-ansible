---

# ------------------------------------------------------------------------------
# File        : ctlabs-ansible/roles/ctlabs_bind/tasks/package.yml
# Description : packages
# ------------------------------------------------------------------------------

- name: ctlabs_bind.tasks.package.debian.update.cache
  when: ctg_os_family == 'debian'
  apt:
    update_cache: true

- name: ctlabs_bind.tasks.package.installed
  package:
    name  : "{{ item.name }}"
    state : present
  loop    : "{{ ctlabs_bind.defaults.pkgs[ctg_os_family] }}"
  register: result
  until   : result is success
