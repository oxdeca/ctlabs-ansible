---

# ------------------------------------------------------------------------------
# File        : ctlabs-ansible/roles/ctlabs_claude_code/tasks/precheck.yml
# Description : prechecks
# ------------------------------------------------------------------------------

- name: ctlabs_claude_code.tasks.precheck
  block:
    - name: ctlabs_claude_code.tasks.precheck.supported_os
      assert:
        that: ctg_os is in ctlabs_claude_code.os
        fail_msg: "OS [{{ ctg_os }}] is not supported!"
  rescue:
    - name: ctlabs_claude_code.tasks.precheck.skip.unsupported
      meta: end_host

- name: ctlabs_claude_code.tasks.precheck.fact.openrouter_api_key
  set_fact:
    ctlabs_claude_code_openrouter_api_key: "{{ ctg_facts.ctlabs_claude_code.openrouter.api_key|default() }}"