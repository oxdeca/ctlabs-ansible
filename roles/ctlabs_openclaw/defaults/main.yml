---

# ------------------------------------------------------------------------------
# File        : ctlabs-ansible/roles/ctlabs_openclaw/defaults/main.yml
# Description : main defaults
# ------------------------------------------------------------------------------

versions:

ctlabs_openclaw:
  defaults:
    pkgs:
      debian: 
        - name: curl
        - name: nodejs
        - name: npm
        - name: git
        - name: build-essential
        - name: python3-dev
      redhat: []
    config:
      dir     : /home/openclaw/.openclaw
      file    : /home/openclaw/.openclaw/openclaw.json
      template: openclaw.json.j2
    certs:
      dir: /etc/ca-ctlabs
      crt: "{{ ansible_nodename }}.crt"
      key: "{{ ansible_nodename }}.prv"
      ca:  ca.crt
    service:
      name    : openclaw.service
      template: openclaw.service.j2
      file    : "{{ ctg_systemd_dir }}/openclaw.service"
      user    : openclaw
      group   : openclaw
      groups  : [certs]
  os:
    - debian12
    - kali2025
