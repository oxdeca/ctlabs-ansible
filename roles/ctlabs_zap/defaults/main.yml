---

# ------------------------------------------------------------------------------
# File        : ctlabs-ansible/roles/ctlabs_zap/defaults/main.yml
# Description : main defaults
# ------------------------------------------------------------------------------

versions:
  java: 17
  zap: 2.17.0

ctlabs_zap:
  defaults:
    pkgs:
      redhat:
        - name: "java-{{ versions.java }}-openjdk"
      debian:
        - name: "openjdk-{{ versions.java }}-jre"
        - name: firefox-esr
        - url: "https://download.opensuse.org/repositories/home:/cabelo/Debian_12/amd64/zap_{{ versions.zap }}-1_amd64.deb"
    config:
    service:
  os:
    - debian12
  virtype:
    - kvm
