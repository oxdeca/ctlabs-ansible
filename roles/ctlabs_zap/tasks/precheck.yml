---

# ------------------------------------------------------------------------------
# File        : ctlabs-ansible/roles/ctlabs_zap/tasks/precheck.yml
# Description : prechecks
# ------------------------------------------------------------------------------

- name: ctlabs_zap.tasks.precheck
  block:
    - name: ctlabs_zap.tasks.precheck.os.supported
      assert:
        that: ctg_os is in ctlabs_zap.os
        fail_msg: "OS [{{ ctg_os }}] is not supported!"

    - name: ctlabs_zap.tasks.precheck.virtype
      assert:
        that     : ctg_virtype is in ctlabs_zap.virtype
        fail_msg : "Virtualization Type '{{ ctg_virtype }}' not supported!"
  rescue:
    - name: ctlabs_zap.tasks.precheck.skip.unsupported
      meta: end_host
