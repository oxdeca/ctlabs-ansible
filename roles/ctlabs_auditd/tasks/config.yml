---

# ------------------------------------------------------------------------------
# File        : ctlabs-ansible/roles/ctlabs_auditd/tasks/config.yml
# Description : configurations
# ------------------------------------------------------------------------------

- name: ctlabs_auditd.tasks.config.rules.dir
  file:
    path : "{{ ctlabs_auditd.defaults.rules.dir }}"
    state: directory

- name: ctlabs_auditd.tasks.config.rules.deploy
  template:
    src  : "{{ ctlabs_auditd.defaults.rules.file }}.j2"
    dest : "{{ ctlabs_auditd.defaults.rules.dir }}/{{ ctlabs_auditd.defaults.rules.file }}"
  notify: ctlabs_auditd.handlers.service.restart
