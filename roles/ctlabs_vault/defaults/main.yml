---

# ------------------------------------------------------------------------------
# File        : ctlabs-ansible/roles/ctlabs_vault/defaults/main.yml
# Description : main defaults file
# ------------------------------------------------------------------------------

# role mode: server, agent, or proxy, cli
CTLABS_VAULT_ROLE : cli
CMD_IP_PATH       : "{{ '/usr/sbin/ip' if ctg_os_family == 'redhat' else '/bin/ip' }}"

# agent / proxy variables
ctlabs_vault_server_addr   : "https://{{ ansible_default_ipv4.address }}:8200"
ctlabs_vault_agent_gcp_role: gce-role
ctlabs_vault_agent_cache   : false
ctlabs_vault_agent_sink    : true
ctlabs_vault_proxy_socktype: unix

# role defaults
ctlabs_vault:
  defaults:
    repos:
      redhat:
        - name: hashicorp
          type: main
          url : "https://rpm.releases.hashicorp.com/RHEL/{{ '8' if (ctg_os_version|int) < 9 else '$releasever' }}/$basearch/stable"
          key : https://rpm.releases.hashicorp.com/gpg
      debian:
        - name: hashicorp
          type: main
          url : https://apt.releases.hashicorp.com 
          key : https://apt.releases.hashicorp.com/gpg
    pkgs:
      redhat:
        - name: vault
        - name: python3-pip
      debian:
        - name: vault
        - name: jq
        - name: python3-pip
        - name: python3-hvac
          when: "{{ (ctg_os_version|int) > 11 }}"
      pips:
        - hvac
    files:
      backup:
        script: vault-backup.py
        dst   : /usr/sbin/vault-backup.py
    config:
      dir   : /etc/vault.d
      server:
        gui      : true
        bin      : /usr/bin/vault
        data     : /opt/vault/data
        file     : vault.hcl
        template : vault.hcl.j2
        port     : 8200
        cert     : /etc/ca-ctlabs/{{ ansible_nodename }}.crt
        key      : /etc/ca-ctlabs/{{ ansible_nodename }}.prv
      agent:
        file    : vault-agent.hcl
        template: vault-agent.hcl.j2
      proxy:
        ca_cert : /etc/ca-ctlabs/ca.crt
        unix    : "/run/vault/vault.sock"
        mtls:
          uri : "{{ ansible_default_ipv4.address }}:8201"
          crt : /etc/ca-ctlabs/{{ ansible_nodename }}.crt
          key : /etc/ca-ctlabs/{{ ansible_nodename }}.prv
          ca  : /etc/ca-ctlabs/ca.crt
        file    : vault-proxy.hcl
        template: vault-proxy.hcl.j2
      init:
        url: "https://{{ ansible_default_ipv4.address }}:8200/v1"
    service:
      user  : vault
      group : vault
      groups: [certs]
      server:
        name: vault.service
      agent:
        name: vault-agent.service
      proxy:
        name: vault-proxy.service
  os:
    - redhat9
    - centos9
    - debian11
    - debian12
