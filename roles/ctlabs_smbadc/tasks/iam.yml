# ------------------------------------------------------------------------------
# File        : ctlabs-ansible/roles/ctlabs_smbadc/tasks/iam.yml
# Description : Idempotent IAM management for Samba AD DC (dynamic memberships)
# ------------------------------------------------------------------------------

- name: ctlabs_smbadc.tasks.iam
  when: ctlabs_smbadc_role == "master"
  block:
    # ==========================================================================
    # DOMAIN WIDE: Password & account expiration policy (MUST come first)
    # ==========================================================================
    - name: ctlabs_smbadc.tasks.iam.policy.password.set
      command: /usr/bin/samba-tool domain passwordsettings set --max-pwd-age=0 --min-pwd-age=0 --history-length=0 --complexity=off
      register: pwd_policy_result
      changed_when: "'Updated password settings' in pwd_policy_result.stdout"
      check_mode: "{{ ansible_check_mode }}"

    # ==========================================================================
    # PHASE 1: Gather baseline state
    # ==========================================================================
    - name: ctlabs_smbadc.tasks.iam.state.groups.gather
      command: /usr/bin/samba-tool group list
      register: existing_groups_raw
      changed_when: false
      check_mode: false

    - name: ctlabs_smbadc.tasks.iam.state.groups.parse
      set_fact:
        existing_groups: >-
          {{
            existing_groups_raw.stdout_lines
            | reject('equalto', '')
            | reject('search', '^(Group|-----|SID)$')
            | map('trim')
            | map('lower')
            | list
          }}
      when: existing_groups_raw.rc == 0

    - name: ctlabs_smbadc.tasks.iam.state.users.gather
      command: /usr/bin/samba-tool user list
      register: existing_users_raw
      changed_when: false
      check_mode: false

    - name: ctlabs_smbadc.tasks.iam.state.users.parse
      set_fact:
        existing_users: >-
          {{
            existing_users_raw.stdout_lines
            | reject('equalto', '')
            | reject('search', '^(User|-----|SID)$')
            | map('trim')
            | map('lower')
            | list
          }}
      when: existing_users_raw.rc == 0

    # ==========================================================================
    # PHASE 2: Create structural objects (OUs → Groups)
    # ==========================================================================
    - name: ctlabs_smbadc.tasks.iam.ou.create
      vars:
        ou_dn: "ou={{ item.name }}{{ (',' + item.path) if item.path is defined else '' }},dc={{ ctlabs_smbadc_domain|split('.')|join(',dc=') }}"
      command: /usr/bin/samba-tool ou create "{{ ou_dn }}"
      loop: "{{ domain_ou | default([]) }}"
      register: ou_creation
      failed_when:
        - ou_creation.rc != 0
        - "'already exists' not in ou_creation.stderr | lower"
        - "'No such object' not in ou_creation.stderr | lower"
      changed_when: ou_creation.rc == 0
      check_mode: "{{ ansible_check_mode }}"

    - name: ctlabs_smbadc.tasks.iam.group.create
      command: >
        /usr/bin/samba-tool group add "{{ item.name }}"
          --groupou="{{ item.ou }}"
      loop: "{{ domain_groups | default([]) }}"
      when:
        - (item.name | lower) not in (existing_groups | default([]))
      register: group_creation
      failed_when:
        - group_creation.rc != 0
        - "'already exists' not in group_creation.stderr | lower"
      changed_when: group_creation.rc == 0
      check_mode: "{{ ansible_check_mode }}"

    # ==========================================================================
    # PHASE 3: Re-gather state after group creation
    # ==========================================================================
    - name: ctlabs_smbadc.tasks.iam.state.groups.regather
      command: /usr/bin/samba-tool group list
      register: groups_after_create_raw
      changed_when: false
      check_mode: false

    - name: ctlabs_smbadc.tasks.iam.state.groups.reparse
      set_fact:
        groups_after_create: >-
          {{
            groups_after_create_raw.stdout_lines
            | reject('equalto', '')
            | reject('search', '^(Group|-----|SID)$')
            | map('trim')
            | map('lower')
            | list
          }}
      when: groups_after_create_raw.rc == 0

    - name: ctlabs_smbadc.tasks.iam.state.memberships.gather
      command: /usr/bin/samba-tool group listmembers "{{ item }}"
      loop: "{{ domain_roles | dict2items | map(attribute='value.groups') | flatten | unique | list }}"
      register: role_group_memberships
      when:
        - domain_roles is defined
        - (item | lower) in (groups_after_create | default([]))
      changed_when: false
      check_mode: false

    - name: ctlabs_smbadc.tasks.iam.state.memberships.parse
      set_fact:
        group_members: >-
          {{
            group_members | default({}) | combine({
              item.item: (item.stdout_lines | map('trim') | map('lower') | list) if (item.rc == 0 and item.stdout_lines) else []
            })
          }}
      loop: "{{ role_group_memberships.results | default([]) }}"
      when: role_group_memberships is defined and role_group_memberships.results is defined

    # ==========================================================================
    # PHASE 4: Create regular users
    # ==========================================================================
    - name: ctlabs_smbadc.tasks.iam.user.create.with_password
      vars:
        username: "{{ (item.lastname[0:5] + item.firstname[0:2]) | lower }}"
      command: >
        /usr/bin/samba-tool user create "{{ username }}"
          "{{ item.pass }}"
          --given-name="{{ item.firstname }}"
          --surname="{{ item.lastname }}"
          --userou="{{ item.ou }}"
          {% if item.uid is defined %}--uid-number="{{ item.uid }}"{% endif %}
          {% if item.gid is defined %}--gid-number="{{ item.gid }}"{% endif %}
          --login-shell="{{ ctlabs_smbadc.defaults.config.domain.user.shell | default('/bin/bash') }}"
          --home-directory="/home/{{ username }}"
      loop: "{{ domain_users | default([]) }}"
      loop_control:
        label: "{{ username }} ({{ item.firstname }} {{ item.lastname }})"
      when:
        - item.firstname is defined and item.lastname is defined
        - item.pass is defined
        - (username | lower) not in (existing_users | default([]))
      register: user_creation_with_pass
      failed_when:
        - user_creation_with_pass.rc != 0
        - "'already exists' not in user_creation_with_pass.stderr | lower"
      changed_when: user_creation_with_pass.rc == 0
      check_mode: "{{ ansible_check_mode }}"

    - name: ctlabs_smbadc.tasks.iam.user.create.random
      vars:
        username: "{{ (item.lastname[0:5] + item.firstname[0:2]) | lower }}"
      command: >
        /usr/bin/samba-tool user create "{{ username }}"
          --given-name="{{ item.firstname }}"
          --surname="{{ item.lastname }}"
          --userou="{{ item.ou }}"
          {% if item.uid is defined %}--uid-number="{{ item.uid }}"{% endif %}
          {% if item.gid is defined %}--gid-number="{{ item.gid }}"{% endif %}
          --login-shell="{{ ctlabs_smbadc.defaults.config.domain.user.shell | default('/bin/bash') }}"
          --home-directory="/home/{{ username }}"
          --random-password
      loop: "{{ domain_users | default([]) }}"
      loop_control:
        label: "{{ username }} ({{ item.firstname }} {{ item.lastname }})"
      when:
        - item.firstname is defined and item.lastname is defined
        - item.pass is not defined
        - (username | lower) not in (existing_users | default([]))
      register: user_creation_random
      failed_when:
        - user_creation_random.rc != 0
        - "'already exists' not in user_creation_random.stderr | lower"
      changed_when: user_creation_random.rc == 0
      check_mode: "{{ ansible_check_mode }}"

    # ==========================================================================
    # PHASE 5: Update passwords for existing users (idempotent rotation)
    # ==========================================================================
    - name: ctlabs_smbadc.tasks.iam.user.password.update
      vars:
        username: "{{ (item.lastname[0:5] + item.firstname[0:2]) | lower }}"
      command: >
        /usr/bin/samba-tool user setpassword "{{ username }}"
          --newpassword="{{ item.pass }}"
      loop: "{{ domain_users | default([]) }}"
      loop_control:
        label: "{{ username }}"
      when:
        - item.firstname is defined and item.lastname is defined
        - item.pass is defined
        - (username | lower) in (existing_users | default([]))
      register: password_update
      failed_when:
        - password_update.rc != 0
        - "'Failed to set password' in password_update.stderr"
      changed_when: password_update.rc == 0
      check_mode: "{{ ansible_check_mode }}"

    # ==========================================================================
    # PHASE 6: Create service accounts
    # ==========================================================================
    - name: ctlabs_smbadc.tasks.iam.service.create
      command: >
        /usr/bin/samba-tool user create "{{ item.name }}"
          --userou="{{ item.ou }}"
          --random-password
      loop: "{{ domain_services | default([]) }}"
      loop_control:
        label: "{{ item.name }}"
      when:
        - item.name is defined
        - (item.name | lower) not in (existing_users | default([]))
      register: svc_user_creation
      failed_when:
        - svc_user_creation.rc != 0
        - "'already exists' not in svc_user_creation.stderr | lower"
      changed_when: svc_user_creation.rc == 0
      check_mode: "{{ ansible_check_mode }}"

    - name: ctlabs_smbadc.tasks.iam.service.password.update
      command: >
        /usr/bin/samba-tool user setpassword "{{ item.name }}"
          --newpassword="{{ item.pass }}"
      loop: "{{ domain_services | default([]) }}"
      loop_control:
        label: "{{ item.name }}"
      when:
        - item.name is defined
        - item.pass is defined
        - (item.name | lower) in (existing_users | default([]))
      register: svc_password_update
      failed_when:
        - svc_password_update.rc != 0
        - "'Failed to set password' in svc_password_update.stderr"
      changed_when: svc_password_update.rc == 0
      check_mode: "{{ ansible_check_mode }}"

    # ==========================================================================
    # PHASE 7: Disable account expiration for ALL users
    # ==========================================================================
    - name: ctlabs_smbadc.tasks.iam.state.users.regather
      command: /usr/bin/samba-tool user list
      register: users_after_create_raw
      changed_when: false
      check_mode: false

    - name: ctlabs_smbadc.tasks.iam.state.users.reparse
      set_fact:
        users_after_create: >-
          {{
            users_after_create_raw.stdout_lines
            | reject('equalto', '')
            | reject('search', '^(User|-----|SID)$')
            | map('trim')
            | map('lower')
            | list
          }}
      when: users_after_create_raw.rc == 0

    - name: ctlabs_smbadc.tasks.iam.user.expiry.disable
      vars:
        username: "{{ (item.lastname[0:5] + item.firstname[0:2]) | lower }}"
      command: /usr/bin/samba-tool user setexpiry "{{ username }}" --noexpiry
      loop: "{{ domain_users | default([]) }}"
      loop_control:
        label: "{{ username }}"
      when:
        - item.firstname is defined and item.lastname is defined
        - (username | lower) in (users_after_create | default([]))
      register: expiry_disable
      failed_when: expiry_disable.rc != 0
      changed_when: expiry_disable.rc == 0
      check_mode: "{{ ansible_check_mode }}"

    - name: ctlabs_smbadc.tasks.iam.service.expiry.disable
      command: /usr/bin/samba-tool user setexpiry "{{ item.name }}" --noexpiry
      loop: "{{ domain_services | default([]) }}"
      loop_control:
        label: "{{ item.name }}"
      when:
        - item.name is defined
        - (item.name | lower) in (users_after_create | default([]))
      register: svc_expiry_disable
      failed_when: svc_expiry_disable.rc != 0
      changed_when: svc_expiry_disable.rc == 0
      check_mode: "{{ ansible_check_mode }}"

    # ==========================================================================
    # PHASE 8: DYNAMIC GROUP MEMBERSHIPS (single task for all roles)
    # ==========================================================================
    - name: ctlabs_smbadc.tasks.iam.state.memberships.build
      set_fact:
        required_memberships: >-
          {{
            required_memberships | default([]) + 
            ([{
              'role': role_item.key,
              'group': group_name,
              'username': (
                identity._type == 'user' 
                and identity.firstname is defined 
                and identity.lastname is defined
                ? ((identity.lastname | lower)[:5] + (identity.firstname | lower)[:2])
                : (identity.name | lower)
              ),
              'identity_type': identity._type
            }] if (
              identity.roles is defined and 
              role_item.key in identity.roles and
              group_name | lower in groups_after_create | default([])
            ) else [])
          }}
      loop: "{{ domain_roles | dict2items }}"
      loop_control:
        loop_var: role_item
      vars:
        # Combine regular users + service accounts into unified list with type marker
        all_identities: >-
          {{
            (domain_users | default([]) | map('combine', {'_type': 'user'}) | list)
            + (domain_services | default([]) | map('combine', {'_type': 'service'}) | list)
          }}
        # Filter identities that have THIS role
        identities_with_role: >-
          {{
            all_identities 
            | selectattr('roles', 'defined') 
            | selectattr('roles', 'contains', role_item.key) 
            | list
          }}
      when: role_item.value.groups is defined
      loop_control:
        extended: true
      vars:
        group_name: "{{ item }}"
        identity: "{{ outer_item }}"
      loop: "{{ role_item.value.groups }}"
      loop_control:
        loop_var: item
        extended: true
      loop: "{{ identities_with_role }}"

    - name: ctlabs_smbadc.tasks.iam.membership.dynamic.add
      command: /usr/bin/samba-tool group addmembers "{{ item.group }}" "{{ item.username }}"
      loop: "{{ required_memberships | default([]) | unique | list }}"
      loop_control:
        label: "role={{ item.role }} group={{ item.group }} user={{ item.username }}"
      when:
        - item.username | lower in users_after_create | default([])
        - item.group | lower in groups_after_create | default([])
        - item.username | lower not in (group_members[item.group] | default([]))
      register: membership_add
      failed_when:
        - membership_add.rc != 0
        - "'already a member' not in membership_add.stderr | lower"
        - "'No such group' not in membership_add.stderr | lower"
      changed_when: membership_add.rc == 0
      check_mode: "{{ ansible_check_mode }}"

  rescue:
    - name: ctlabs_smbadc.tasks.iam.failure.handle
      fail:
        msg: |
          IAM provisioning failed during samba-tool operations.
          First DC provisioning must complete successfully before IAM tasks run.
          Check that 'samba-tool domain provision' succeeded and DC is running.
